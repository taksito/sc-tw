<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Citizen 繁體中文新手入門教學</title>
    <meta name="description" content="專為繁體中文玩家設計的星際公民 (Star Citizen) 新手入門教學網站。">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main>
        <section class="hero glass-panel">
            <h1>歡迎來到 <span class="text-gradient">Star Citizen</span> 宇宙</h1>
            <p>這是一份專為繁體中文玩家準備的生存與起步指南。無論你是剛買包的新手，還是想要尋找特定技巧的老鳥，這裡都能為你指明方向。</p>
            <div style="margin-top: 30px;">
                <a href="character-creation.html" class="btn">開始你的旅程</a>
            </div>
        </section>

        <section class="card-grid">
            <a href="ctinput1.html" class="nav-card glass-panel">
                <h3 class="text-gradient">中文化與輸入</h3>
                <p>了解如何安裝繁體中文化模組，並使用專屬的中文字元轉換器在遊戲中順暢溝通。</p>
            </a>

            <a href="character-creation.html" class="nav-card glass-panel">
                <h3 class="text-gradient">角色創建</h3>
                <p>從選擇起始包、創建帳號，到首次進入宇宙建立你的專屬角色外觀。</p>
            </a>

            <a href="first-flight.html" class="nav-card glass-panel">
                <h3 class="text-gradient">首次航行</h3>
                <p>從居住艙醒來，搭乘地鐵，召喚飛船，一直到飛向太空站的完整操作手冊。</p>
            </a>

            <a href="fps-equipment.html" class="nav-card glass-panel">
                <h3 class="text-gradient">FPS 裝備介紹</h3>
                <p>該買什麼護甲？哪裡買醫療針？認識基本生存與戰鬥裝備。</p>
            </a>

            <a href="ground-combat.html" class="nav-card glass-panel">
                <h3 class="text-gradient">地面戰技巧</h3>
                <p>地堡任務 (Bunker) 怎麼打？基礎交戰守則與走位技巧分享。</p>
            </a>
        </section>
    </main>

    <script src="components.js"></script>
