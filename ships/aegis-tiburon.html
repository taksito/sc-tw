<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Tiburon - Star Citizen 飛船指南</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .ship-header { text-align: center; margin-bottom: 30px; }
        .ship-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .stat-box { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 8px; border: 1px solid var(--glass-border); text-align: center; }
        .stat-value { font-size: 1.5rem; color: var(--accent); font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <main>
        <section class="glass-panel" style="padding: 40px;">
            <div class="ship-header">
                <h1>Aegis <span class="text-gradient">Tiburon</span></h1>
                <p>大型戰鬥艦 (Large Combat Ship)</p>
            </div>

            <div style="margin-bottom: 30px; border-radius: 12px; overflow: hidden; border: 1px solid var(--glass-border);">
                <img src="https://starcitizen.tools/Special:FilePath/Tiburon_various_views_with_graphics_for_DefenseCon_2956.jpg" alt="Aegis Tiburon" style="width: 100%; height: auto; display: block;">
            </div>

            <h2 class="text-gradient" style="margin-top: 30px; margin-bottom: 20px;">船艦介紹</h2>
            <p>
                Tiburon 是一艘由 Aegis Dynamics 開發的大型戰鬥艦。它具備強大的火力與防禦能力，適合執行深空巡邏與主力艦隊護航任務。繼承了 Aegis 優良的軍工傳統，這艘戰艦能夠在最險惡的戰區中為盟友提供穩定的火力支援。
            </p>

            <div class="ship-stats">
                <div class="stat-box">
                    <div>製造商</div>
                    <div class="stat-value" style="font-size: 1.2rem; color: #fff;">Aegis</div>
                </div>
                <div class="stat-box">
                    <div>定位</div>
                    <div class="stat-value" style="font-size: 1.2rem;">大型戰鬥艦</div>
                </div>
            </div>
            
            <div style="margin-top: 30px; text-align: center;">
                <a href="https://starcitizen.tools/Tiburon" target="_blank" rel="noopener noreferrer" style="color: var(--accent); text-decoration: none;">查看 Star Citizen Wiki 詳細資料 ↗</a>
            </div>
            
            <div style="margin-top: 40px; text-align: center;">
                <a href="../update48/index.html" class="btn">返回 4.8 改版資訊</a>
            </div>
        </section>
    </main>
    <script src="../components.js"></script>
</body>
</html>
